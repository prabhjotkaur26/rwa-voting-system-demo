name: Deploy RWA Voting System

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: terraform
  S3_BUCKET: rwa-voting-system-terraform-state
  DYNAMODB_TABLE: terraform-locks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout Code
        uses: actions/checkout@v3

      # -------------------------------
      # AWS Credentials
      # -------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------
      # BACKEND BOOTSTRAP
      # -------------------------------
      - name: Create S3 Bucket (if not exists)
        run: |
          BUCKET=$S3_BUCKET

          if aws s3api head-bucket --bucket $BUCKET 2>/dev/null; then
            echo "Bucket exists"
          else
            aws s3api create-bucket \
              --bucket $BUCKET \
              --region $AWS_REGION \
              --create-bucket-configuration LocationConstraint=$AWS_REGION
          fi

          aws s3api put-bucket-versioning \
            --bucket $BUCKET \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket $BUCKET \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }
              ]
            }'

      - name: Create DynamoDB Lock Table (if not exists)
        run: |
          TABLE=$DYNAMODB_TABLE

          aws dynamodb describe-table --table-name $TABLE 2>/dev/null || \
          aws dynamodb create-table \
            --table-name $TABLE \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST

          aws dynamodb wait table-exists --table-name $TABLE

      # -------------------------------
      # Install Dependencies
      # -------------------------------
      - name: Install Lambda Dependencies
        run: |
          pip install PyJWT -t lambda/auth/
          pip install PyJWT -t lambda/verify/
          pip install PyJWT -t lambda/vote/

      # -------------------------------
      # Build Lambda Zips
      # -------------------------------
      - name: Build Lambda Zips
        run: |
          mkdir -p lambda/.build

          for dir in lambda/*/ ; do
            name=$(basename $dir)
            zip -r lambda/.build/$name.zip $dir
          done

      # -------------------------------
      # Terraform Setup
      # -------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
